<h1>YouTube Transcript Search</h1>

<div>
  <label>YouTube kanal:</label>
  <br />

  <input
    type="text"
    [(ngModel)]="channel"
    placeholder="https://www.youtube.com/@TragBiljke/videos"
    [disabled]="isPreparing"
  />

  <br /><br />

  <button (click)="prepareChannel()" [disabled]="isPreparing">
    Pripremi kanal
  </button>
</div>

<br />

<div>
  <p>Status: {{ message }}</p>
  <p>Progres: {{ progress }}%</p>
</div>
